artifacts:
  - id: completion_note
    type: note
    owner: guard
    required_for:
      - close_after_note
    path: .local/guard/artifacts/{profile_id}/{instance_id}/{state_version}/completion-note.json
    freshness:
      scope: current_state_entry
    reuse_policy: deny
    description: 一条短 note（说明记录），证明样例 flow（流程）已准备关闭。
  - id: cross_agent_review_pass
    type: json
    owner: external
    required_for:
      - produce_cross_agent_review_pass_marker
    path: .local/cross-agent-review/{change}/{git_head}/review-pass.json
    reuse_policy: deny
    description: cross-agent-review 通过时生成的 pass marker。
