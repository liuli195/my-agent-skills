initial_state: open
terminal_states:
  - closed
states:
  - id: open
    description: Guard Profile（守卫画像）已激活，正在等待必需 note（说明记录）。
  - id: closed
    description: Guard Profile（守卫画像）已完成样例 flow（流程）。
transitions:
  - id: close_after_note
    from: open
    to: closed
    on_event: state_completed
    guard_points:
      - completion_note_present
    required_artifacts:
      - completion_note
