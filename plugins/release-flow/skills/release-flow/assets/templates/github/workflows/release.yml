name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      version:
        description: Release version
        required: true
        type: string
      bumpPlugins:
        description: Comma-separated plugins to bump; empty means catalog/projection only
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          path: source

      - name: Install release-flow dependencies
        run: python -m pip install PyYAML

      - name: Publish release channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          python source/plugins/release-flow/skills/release-flow/scripts/release_flow.py
          ci-publish
          --project source
          --tag "${{ inputs.tag }}"
          --version "${{ inputs.version }}"
          --bump-plugins "${{ inputs.bumpPlugins }}"
          --authorize-ci-publish
