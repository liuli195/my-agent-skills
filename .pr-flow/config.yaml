defaults:
  baseBranch: main
  mergeStrategy: merge
  reviewGate:
    mode: github
    evidencePath: .pr-flow/review-pass.json
  hotfix:
    verifyCommand: python .build-and-verify/runtime/build_and_verify.py verify --project . --full
  wait:
    timeoutSeconds: 600
    pollSeconds: 15
  pr:
    bodyTemplatePath: .pr-flow/pr-template.md
    requiredSections:
    - Summary
    - Scope
    - Closing References
authorization:
  phraseHashAlgorithm: md5
  phraseHash: 4f9ee82bfd2ac6399a3e330ac49d75f1
branches:
  main:
    remote: origin
    allowHotfixPush: true
setup:
  github:
    branchRulesets:
    - name: PR Flow protected branches
      branches:
      - main
      requirePullRequestBeforeMerging: true
      requiredApprovingReviewCount: 0
      restrictDeletions: true
      blockForcePushes: true
    - name: Release Flow channel branch
      branches:
      - marketplace
      restrictDeletions: true
      note: keep deletion-only protection
    requiredChecks:
    - Full Verify
    statusChecks:
      required:
      - name: Full Verify
        source: Full Verify workflow job
        purpose: repository full verification
    codeScanning:
      tool: CodeQL
      requireResults: true
      alertsThreshold: github-default
    allowedMergeMethods:
    - merge
    autoDeleteHeadBranch: false
    hotfixBypass:
      branches:
      - main
