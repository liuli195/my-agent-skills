name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      version:
        description: Release version
        required: true
        type: string
      releasePlan:
        description: Release plan path
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ vars.RELEASE_FLOW_SOURCE_REF || 'main' }}
          path: source

      - name: Checkout release-flow plugin
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.RELEASE_FLOW_PLUGIN_REPOSITORY }}
          ref: ${{ vars.RELEASE_FLOW_PLUGIN_REF }}
          path: release-flow-plugin

      - name: Install release-flow dependencies
        run: python -m pip install PyYAML

      - name: Write release variables
        env:
          CODEX_MARKETPLACE_CATALOG_NAME: ${{ vars.CODEX_MARKETPLACE_CATALOG_NAME }}
          CODEX_MARKETPLACE_DISPLAY_NAME: ${{ vars.CODEX_MARKETPLACE_DISPLAY_NAME }}
          CLAUDE_MARKETPLACE_CATALOG_NAME: ${{ vars.CLAUDE_MARKETPLACE_CATALOG_NAME }}
          CLAUDE_MARKETPLACE_OWNER_NAME: ${{ vars.CLAUDE_MARKETPLACE_OWNER_NAME }}
        run: |
          python - <<'PY'
          import json
          import os

          variables = {
              "CODEX_MARKETPLACE_CATALOG_NAME": os.environ.get("CODEX_MARKETPLACE_CATALOG_NAME", ""),
              "CODEX_MARKETPLACE_DISPLAY_NAME": os.environ.get("CODEX_MARKETPLACE_DISPLAY_NAME", ""),
              "CLAUDE_MARKETPLACE_CATALOG_NAME": os.environ.get("CLAUDE_MARKETPLACE_CATALOG_NAME", ""),
              "CLAUDE_MARKETPLACE_OWNER_NAME": os.environ.get("CLAUDE_MARKETPLACE_OWNER_NAME", ""),
          }
          with open("release-vars.json", "w", encoding="utf-8") as handle:
              json.dump(variables, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Initialize release plan
        run: >
          python release-flow-plugin/plugins/release-flow/skills/release-flow/scripts/release_flow.py
          release-init
          --project source
          --tag "${{ inputs.tag }}"
          --version "${{ inputs.version }}"
          --replace

      - name: Publish release channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          python release-flow-plugin/plugins/release-flow/skills/release-flow/scripts/release_flow.py
          ci-publish
          --project source
          --tag "${{ inputs.tag }}"
          --release-plan "${{ inputs.releasePlan }}"
          --vars-file release-vars.json
          --authorize-ci-publish
